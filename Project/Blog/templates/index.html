<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aakash Dandekar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1f2933;
            --card: #f5f7fa;
            --accent: #2563eb;
        }

        body.dark {
            --bg: #0f172a;
            --text: #e5e7eb;
            --card: #1e293b;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            padding-left: 70px;
        }

        header button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 1fr);
            gap: 1.5rem;
        }

        .card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .card p {
            font-size: 0.95rem;
            opacity: 0.85;
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header>
        <h1>Aakash Dandekar</h1>
        <button onclick="toggleTheme()" id="mode">Mode</button>
    </header>
    <main>
        <section class="grid">
            {% for post in data %}
                <article class="card">
                    <h2>{{ post.title }}</h2>
                    <p>{{ post.content }}</p><br>
                    <small>{{ post.createdAt }}</small>
                </article>
            {% endfor %}
        </section>
    </main>
    <footer>
        &copy; 2026 Aakash Dandekar · Daily Checkin's
    </footer>
    <script>
        function toggleTheme() {
            document.body.classList.toggle("dark");
        }
    </script>
</body>
</html>
